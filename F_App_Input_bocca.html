<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rilevatore Bocca Aperta/Chiusa</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>

    <style>
        body { text-align: center; font-family: sans-serif; background: #222; color: white; }
        #video { transform: scaleX(-1); width: 100%; max-width: 500px; border-radius: 10px; }
        #status { font-size: 2rem; font-weight: bold; margin-top: 20px; padding: 10px; }
        .aperta { color: #4CAF50; }
        .chiusa { color: #F44336; }
    </style>
</head>
<body>

    <h1>Rilevatore Bocca</h1>
    <video id="video" autoplay playsinline></video>
    <div id="status">Inizializzazione...</div>

    <script>
        const videoElement = document.getElementById('video');
        const statusElement = document.getElementById('status');

        // Configura il modello Face Mesh di MediaPipe
        const faceMesh = new FaceMesh({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
        });

        faceMesh.setOptions({
            maxNumFaces: 1,
            refineLandmarks: true, // Attiva landmark extra per labbra e occhi
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        faceMesh.onResults(onResults);

        // Funzione che analizza i risultati
        function onResults(results) {
            if (!results.multiFaceLandmarks || results.multiFaceLandmarks.length === 0) {
                statusElement.innerText = "Faccia non rilevata";
                statusElement.className = "";
                return;
            }

            const landmarks = results.multiFaceLandmarks[0];

            // Punto 13: Centro del labbro superiore interno
            // Punto 14: Centro del labbro inferiore interno
            const lipUpper = landmarks[13];
            const lipLower = landmarks[14];

            // Calcola la distanza euclidea (Asse Y principalmente)
            const distance = Math.sqrt(
                Math.pow(lipUpper.x - lipLower.x, 2) + 
                Math.pow(lipUpper.y - lipLower.y, 2)
            );

            // Soglia empirica (può variare in base alla distanza dal telefono)
            // Con "refineLandmarks: true", i valori sono proporzionali alla faccia
            const SOGLIA = 0.025; 

            if (distance > SOGLIA) {
                statusElement.innerText = "BOCCA APERTA";
                statusElement.className = "aperta";
            } else {
                statusElement.innerText = "BOCCA CHIUSA";
                statusElement.className = "chiusa";
            }
        }

        // Avvia la fotocamera frontale su Android
        const camera = new Camera(videoElement, {
            onFrame: async () => {
                await faceMesh.send({ image: videoElement });
            },
            width: 640,
            height: 480,
            facingMode: "user" // Forza l'uso della fotocamera frontale
        });
        
        camera.start().catch(err => {
            statusElement.innerText = "Errore nell'accesso alla webcam: " + err;
        });
    </script>
</body>
</html>
