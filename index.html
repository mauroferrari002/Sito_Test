<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Gestione Applicazione</title>
    <style>
        :root {
            --primary-color: #2196F3;
            --bg-color: #f5f5f5;
            --card-bg: #ffffff;
            --accent-color: #1565C0;
            --danger-color: #f44336;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #333;
        }

        .container {
            width: 95%;
            max-width: 500px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
        }

        .main-title {
            color: var(--accent-color);
            font-size: 1.8rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 1rem;
        }

        .menu-grid {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .nav-button {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            font-size: 1.1rem;
            font-weight: bold;
            color: white;
            background-color: var(--primary-color);
            border: none;
            border-radius: 12px;
            text-decoration: none;
            transition: all 0.2s ease;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(33, 150, 243, 0.2);
        }

        .nav-button:hover {
            transform: translateY(-2px);
            background-color: var(--accent-color);
            box-shadow: 0 6px 12px rgba(33, 150, 243, 0.3);
        }

        .nav-button:active {
            transform: translateY(0);
        }

        .nav-button.secondary {
            background-color: #607D8B;
            box-shadow: 0 4px 6px rgba(96, 125, 139, 0.2);
        }

        .nav-button.secondary:hover {
            background-color: #455A64;
        }

        .nav-button.danger {
            background-color: white;
            color: var(--danger-color);
            border: 2px solid var(--danger-color);
            box-shadow: none;
            margin-top: 10px;
        }

        .nav-button.danger:hover {
            background-color: var(--danger-color);
            color: white;
        }

        .icon {
            margin-right: 12px;
            font-size: 1.4rem;
        }
    </style>
</head>
<body>

<div class="container">
    <h1 class="main-title">Controllo Sistema</h1>
    <p class="subtitle">Seleziona un'area di gestione</p>

    <div class="menu-grid">
        <a href="Pannello_Configurazioni_Iniziali_Applicazione.html" class="nav-button">
            <span class="icon">⚙️</span> Configurazione Parametri Iniziale
        </a>

        <a href="Pannello_Configurazione_Menu_Televisore.html" class="nav-button secondary">
            <span class="icon">📺</span> Modifica Manuale Menu Televisore
        </a>

        <a href="Pannello_Configurazione_Menu_Televisore_IA.html" class="nav-button secondary">
            <span class="icon">📺</span> Modifica "IA" Menu Televisore
        </a>

        <button onclick="closeApp()" class="nav-button danger">
            <span class="icon">✖</span> CHIUDI APPLICAZIONE
        </button>
    </div>
</div>

<script>
    function closeApp() {
        // Tenta di chiudere la finestra
        window.close();
        
        // Messaggio di fallback se il browser blocca la chiusura automatica
        setTimeout(function() {
            alert("Per chiudere l'applicazione, chiudi manualmente questa scheda del browser.");
        }, 4000);
    }
</script>

</body>
</html>
